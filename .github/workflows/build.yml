name: Build
on:
  schedule:
    - cron: "0 19 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build
  cancel-in-progress: true

jobs:
  build:
    name: Build
    uses: Hong-Kong-Public-Transport/Bus-Destination-Display-Processor/.github/workflows/build.yml@master
  generate:
    name: Generate
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout repository
        uses: actions/checkout@main
      - name: Download JAR
        uses: actions/download-artifact@main
        with:
          name: Artifact
          path: build/libs
      - name: Setup JDK 21
        uses: actions/setup-java@main
        with:
          java-version: 21
          distribution: 'zulu'
      - name: Run JAR
        run: java -jar build/libs/Bus-Destination-Display-Processor-*-all.jar "${{ secrets.BASE_URL }}" "ctb_hanover_orange" "display"
      - name: Load SSH signing key
        uses: webfactory/ssh-agent@master
        with:
          ssh-private-key: ${{ secrets.SSH_KEY }}
      - name: Configure Git
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          ssh-add -L | head -n 1 > ssh_key.pub
          git config gpg.format ssh
          git config user.signingkey "$(pwd)/ssh_key.pub"
          git config commit.gpgsign true
          git config gpg.ssh.program "ssh-keygen"
          echo "41898282+github-actions[bot]@users.noreply.github.com $(cat ssh_key.pub)" > .allowed_signers
          git config gpg.ssh.allowedSignersFile "$(pwd)/.allowed_signers"
      - name: Stage changes
        run: |
          git add -A
          git reset build/** .allowed_signers ssh_key.pub
      - name: Commit and push
        shell: bash
        run: |
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "Update displays"
          git push
